name: Daily Brief Hybrid Research

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 = 新加坡时间 08:00
  workflow_dispatch:

jobs:
  send-brief-hybrid-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hybrid research brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          COLLECT_TIMEOUT_SECONDS: ${{ secrets.COLLECT_TIMEOUT_SECONDS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python daily_brief_hybrid_research.py
